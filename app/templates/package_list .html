{% extends 'base.html' %}
{% load static %}  {# Load the static tag #}

{% block content %}
    <div class="container mt-5">
        <h2 class="text-center">Travel Packages</h2>
        <div class="row mt-4">
            {% for package in packages %}
            <div class="col-md-4">
                <div class="card">
                    <img src="{{ package.image.url }}" class="card-img-top" alt="{{ package.name }}">
                    <div class="card-body text-center">
                        <h5 class="card-title">{{ package.name }}</h5>
                        <p class="card-text">{{ package.description }}</p>
                        <a href="{{ package.get_absolute_url }}" class="btn btn-primary">View Details</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
{% endblock %}
