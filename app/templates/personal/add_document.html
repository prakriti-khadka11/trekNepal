{% extends 'base.html' %}
{% load static %}

{% block title %}Add Document - TrekNepal{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header" style="background: linear-gradient(135deg, #17a2b8, #138496); color: white;">
                    <h4 class="mb-0"><i class="fas fa-plus me-2"></i>Add Travel Document</h4>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Document Type</label>
                                <select class="form-select" name="document_type" required>
                                    <option value="">Select Type</option>
                                    <option value="passport">Passport</option>
                                    <option value="visa">Visa</option>
                                    <option value="insurance">Travel Insurance</option>
                                    <option value="ticket">Flight Ticket</option>
                                    <option value="hotel">Hotel Booking</option>
                                    <option value="permit">Trekking Permit</option>
                                    <option value="vaccination">Vaccination Certificate</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Title</label>
                                <input type="text" class="form-control" name="title" required placeholder="e.g., Nepal Passport">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Document Number</label>
                                <input type="text" class="form-control" name="document_number" placeholder="Optional">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Issuing Authority</label>
                                <input type="text" class="form-control" name="issuing_authority" placeholder="e.g., Department of Passports">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Issue Date</label>
                                <input type="date" class="form-control" name="issue_date">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Expiry Date</label>
                                <input type="date" class="form-control" name="expiry_date">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Document File</label>
                            <input type="file" class="form-control" name="document_file" accept=".pdf,.jpg,.jpeg,.png">
                            <small class="text-muted">Upload PDF, JPG, or PNG files (Max 10MB)</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea class="form-control" name="notes" rows="3" placeholder="Additional notes about this document"></textarea>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'travel_documents' %}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Back
                            </a>
                            <button type="submit" class="btn btn-info">
                                <i class="fas fa-save me-2"></i>Add Document
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
