{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <h2 class="text-center">Explore Nepal</h2>
        <div class="row mt-4">
            {% for country in countries %}
                <div class="col-md-4">
                    <div class="card">
                        <img src="{{ country.image.url }}" class="card-img-top" alt="{{ country.name }}">
                        <div class="card-body text-center">
                            <h5 class="card-title">{{ country.name }}</h5>
                            <a href="{{ country.get_absolute_url }}" class="btn btn-primary">View Trips</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
{% endblock %}
