<div class="container py-5">
    {% if title %}
        <h2 class="mb-4 text-center">{{ title }}</h2>
    {% endif %}
    <div class="row g-4">
        {% for image in images %}
        <div class="col-sm-6 col-md-4 col-lg-3" data-aos="fade-up" data-aos-delay="{{ forloop.counter|add:'100' }}">
            <div class="card border-0 shadow-sm">
                <a href="{{ image.image.url }}" target="_blank">
                    <img src="{{ image.image.url }}" class="card-img-top" alt="Gallery Image" style="height: 200px; object-fit: cover;">
                </a>
            </div>
        </div>
        {% empty %}
        <p class="text-muted">No gallery images available for this destination.</p>
        {% endfor %}
    </div>
</div>
